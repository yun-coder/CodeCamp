spec_version: 1
id: frame-nyt-graph
name: NYT Graph
description: >
  Animated data chart in print editorial style

engine: hyperframes
engine_version: ^0.4.0
source_entry: index.html

category: data-viz
subcategory: editorial
tags: [data, chart, editorial, nyt, line-graph]

best_for:
  - "News-style stat reveal"
  - "Line chart over time"
  - "Editorial data point"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 30
    default_sec: 15
  alpha: false
  audio: { supported: false }

inputs:
  schema:
    type: object
    properties: {}
  examples: []

license:
  spdx: Apache-2.0
  attribution_required: true
  redistribution_allowed: true
  commercial_use: true
  notes: "Forked from heygen-com/hyperframes registry/examples/nyt-graph (Apache-2.0)."

assets_attribution:
  - name: "hyperframes registry/examples/nyt-graph"
    license: "Apache-2.0"
    author: "heygen-com / Hyperframes"
    url: ""
author:
  name: "heygen-com / Hyperframes"
  url: ""
version: "0.1.0"

preview:
  poster: poster.svg
