spec_version: 1
id: frame-data-chart-nyt
name: NYT Data Chart
description: >
  New York Times-style animated data chart with counter animation and editorial typography.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: data-viz
subcategory: bar-chart
tags: [chart, bar, data, nyt, journalism, number-counter]

best_for:
  - "Editorial data viz"
  - "Annual report"
  - "Comparison reveal"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 5
    max_sec: 20
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [title, data]
    properties:
      title:
        type: "string"
        maxLength: 100
        description: "Chart headline"
      subtitle:
        type: "string"
        maxLength: 200
        description: "Secondary line / source"
      data:
        type: "array"
        minItems: 2
        maxItems: 12
        items:
          type: object
          required: ['label', 'value']
          properties:
            label: { type: string }
            value: { type: number }
      duration_sec:
        type: "number"
        minimum: 5
        maximum: 20
        default: 8
  examples:
    - {"title": "OD plugin library", "subtitle": "by category, 2026-05", "data": [{"label": "Templates", "value": 231}, {"label": "Skills", "value": 15}, {"label": "Systems", "value": 150}, {"label": "Craft", "value": 11}], "duration_sec": 8}

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: ""
  contact: ""
version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-27
    notes: Cherry-picked from open-design/repo/skills/frame-data-chart-nyt/example.html

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 8
    render_wall_clock_sec: 14
    machine: "M2 MacBook Air"
