<html>

<head>

    <title>web服务页面</title>

    <style type="text/css">
        html{height:100%}
        body{height:100%;margin:0px;padding:0px}
        #container{height:100%}
    </style>
</head>

<body id="page-top">

<div id="container"></div>

</body>

</html>

<script>
    var markerArr = {:json_encode($site)};
    var map;
    function map_init(){
        map = new BMap.Map("container");
        //第1步：设置地图中心点
        var point = new BMap.Point(119.2833333, 35.03333);
        //第2步：初始化地图,设置中心点坐标和地图级别。
        map.centerAndZoom(point, 8);
        //第3步：启用滚轮放大缩小
        map.enableScrollWheelZoom(true);
        //第4步：向地图中添加缩放控件
        var ctrlNav = new window.BMap.NavigationControl({
            anchor: BMAP_ANCHOR_TOP_LEFT,
            type: BMAP_NAVIGATION_CONTROL_LARGE
        });
        map.addControl(ctrlNav);
        //第5步：向地图中添加缩略图控件
        var ctrlOve = new window.BMap.OverviewMapControl({
            anchor: BMAP_ANCHOR_BOTTOM_RIGHT,
            isOpen: 1
        });
        map.addControl(ctrlOve);

        //第6步：向地图中添加比例尺控件
        var ctrlSca = new window.BMap.ScaleControl({
            anchor: BMAP_ANCHOR_BOTTOM_LEFT
        });
        map.addControl(ctrlSca);

        //第7步：绘制点
        for (var i = 0; i < markerArr.length; i++) {
            var p0 = markerArr[i].point_longitude;
            var p1 = markerArr[i].point_coordinate;
            var sn = markerArr[i].unit_num;
            var label = new BMap.Label(sn,{offset:new BMap.Size(20,-10)});
            var maker = addMarker(new window.BMap.Point(p0, p1), i,label);
            addInfoWindow(maker, markerArr[i], i);
        }
    }

    // 添加标注
    function addMarker(point, index,label) {
        var marker = new BMap.Marker(point);
        map.addOverlay(marker);
        marker.setLabel(label);
        return marker;
    }

    // 添加信息窗口
    function addInfoWindow(marker, poi) {
        //pop弹窗标题
        var title = '<div style="font-weight:bold;color:#CE5521;font-size:14px">' + poi.unit_num + '</div>';
        //pop弹窗信息
        var html = [];
        html.push('<table cellspacing="0" style="table-layout:fixed;width:100%;font:12px arial,simsun,sans-serif"><tbody>');
        html.push('<tr>');
        html.push('<td style="vertical-align:top;line-height:16px;width:60px;white-space:nowrap;word-break:keep-all">海域名称:</td>');
        html.push('<td style="vertical-align:top;line-height:16px">' + poi.sea_area_name + ' </td>');
        html.push('</tr>');
        html.push('</tbody></table>');
        var infoWindow = new BMap.InfoWindow(html.join(""), { title: title, width: 200 });

        var openInfoWinFun = function () {
            marker.openInfoWindow(infoWindow);
        };
        marker.addEventListener("click", openInfoWinFun);
        return openInfoWinFun;
    }

    //异步调用百度js
    function map_load() {
        var load = document.createElement("script");
        load.src = "http://api.map.baidu.com/api?v=3.0&ak=5gOhpcscukkbs1n1A2ubGK2yS7KCGSMO&callback=map_init";
        document.body.appendChild(load);
    }
    window.onload = map_load;
</script>
