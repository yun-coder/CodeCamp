spec_version: 1
id: frame-play-mode
name: Play Mode
description: >
  Playful elastic animations

engine: hyperframes
engine_version: ^0.4.0
source_entry: index.html

category: social-shorts
subcategory: playful
tags: [playful, elastic, fun, bouncy, social]

best_for:
  - "Playful social ad"
  - "Casual intro"
  - "Fun product"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 30
    default_sec: 10
  alpha: false
  audio: { supported: false }

inputs:
  schema:
    type: object
    properties: {}
  examples: []

license:
  spdx: Apache-2.0
  attribution_required: true
  redistribution_allowed: true
  commercial_use: true
  notes: "Forked from heygen-com/hyperframes registry/examples/play-mode (Apache-2.0)."

assets_attribution:
  - name: "hyperframes registry/examples/play-mode"
    license: "Apache-2.0"
    author: "heygen-com / Hyperframes"
    url: ""
author:
  name: "heygen-com / Hyperframes"
  url: ""
version: "0.1.0"

preview:
  poster: poster.svg
