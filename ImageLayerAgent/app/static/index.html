<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小画助手</title>
    <link rel="stylesheet" href="/static/styles.css?v=comfort-20260605b" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/" aria-label="小画助手工作台">
          <span class="brand-mark">画</span>
          <span class="brand-copy">
            <strong>小画助手</strong>
            <small>ImageLayer Agent</small>
          </span>
        </a>
        <nav class="side-nav" aria-label="主菜单">
          <a class="side-link active" href="/" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h13A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-13Z" />
              <path d="M8 8h8M8 12h5M8 16h7" />
            </svg>
            <span>创作入口</span>
          </a>
        </nav>
        <a class="settings-icon-link" href="/settings" aria-label="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.1 2.1 0 0 1-2.97 2.97l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21a2.1 2.1 0 0 1-4.2 0v-.08a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2.1 2.1 0 0 1-2.97-2.97l.05-.05A1.8 1.8 0 0 0 3.8 15a1.8 1.8 0 0 0-1.66-1.1H2a2.1 2.1 0 0 1 0-4.2h.08A1.8 1.8 0 0 0 3.74 8.6a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.1 2.1 0 0 1 6.3 3.6l.05.05a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 9.43 2.35V2a2.1 2.1 0 0 1 4.2 0v.08a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.1 2.1 0 0 1 2.97 2.97l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1H21a2.1 2.1 0 0 1 0 4.2h-.08A1.8 1.8 0 0 0 19.4 15Z" />
          </svg>
        </a>
      </aside>

      <section class="main-pane">
        <header class="page-header">
          <div>
            <p class="eyebrow">XiaoHua Replace</p>
            <h1>小画产品替换</h1>
            <p>上传原图和产品图，小画会保留原图背景风格，并把新产品替换到旧产品位置。</p>
          </div>
          <div class="actions">
            <button id="packageButton" disabled>下载结果</button>
          </div>
        </header>

        <section class="workspace workflow-workspace">
          <section id="mindmapViewport" class="workflow-canvas mindmap-viewport no-project" aria-label="工作流画布">
            <div class="workflow-grid" aria-hidden="true"></div>

            <div class="mindmap-toolbar" aria-label="画布工具">
              <button id="zoomOutButton" type="button" aria-label="缩小">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" /></svg>
              </button>
              <button id="zoomResetButton" type="button">100%</button>
              <button id="zoomInButton" type="button" aria-label="放大">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
              </button>
            </div>

            <div id="mindmapStage" class="mindmap-stage">
              <svg id="mindmapLinks" class="mindmap-links" aria-hidden="true">
                <defs>
                  <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                    <path d="M0 0 L10 5 L0 10 Z" fill="rgba(111, 55, 69, 0.42)" />
                  </marker>
                </defs>
              </svg>

              <article id="startNode" class="mind-node start-node">
                <div class="mind-node-header">
                  <span>Scene 01</span>
                  <strong>上传原图</strong>
                </div>
                <div class="start-image-frame">
                  <canvas id="canvas" width="1024" height="1024"></canvas>
                  <div id="canvasEmpty" class="canvas-empty">
                    <strong>上传原图开始产品替换吧</strong>
                    <span>原图会作为背景风格来源，下一步继续上传要替换进去的产品图。</span>
                  </div>
                </div>
              </article>

              <article id="ocrNode" class="mind-node ocr-node waiting">
                <div class="mind-node-header">
                  <span>Scene 02</span>
                  <strong>原图分析</strong>
                </div>
                <div id="ocrNodeBody" class="ocr-node-body">
                  <div class="mind-node-empty">等待原图上传后开始定位旧产品。</div>
                </div>
              </article>

              <article id="productNode" class="mind-node product-node waiting">
                <div class="mind-node-header">
                  <span>Product 03</span>
                  <strong>产品图处理</strong>
                </div>
                <div id="productNodeBody" class="product-node-body">
                  <div class="mind-node-empty">等待上传产品图。</div>
                </div>
              </article>

              <article id="reconstructNode" class="mind-node reconstruct-node waiting">
                <div class="mind-node-header">
                  <span>Result 04</span>
                  <strong>替换结果</strong>
                </div>
                <div id="reconstructNodeBody" class="reconstruct-node-body">
                  <div class="mind-node-empty">等待生成替换结果。</div>
                </div>
              </article>
            </div>

            <div id="mindmapStatus" class="mindmap-status">拖拽空白处移动画布，滚轮缩放。</div>
            <div id="workflowOutputs" class="sr-only" aria-live="polite"></div>
            <div id="layerList" class="sr-only"></div>
            <div id="ocrOverlay" class="sr-only"></div>
          </section>
        </section>
      </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/agent-chat.js"></script>
  </body>
</html>
