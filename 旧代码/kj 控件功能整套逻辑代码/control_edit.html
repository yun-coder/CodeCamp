    <link rel=icon href=/favicon.ico>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="js/toastr/toastr.min.css">

<body>
<div class="container-fluid">

            <li class="header">
                <button class="btn btn-primary" data-toggle="modal" id="query_connect" data-target="#controlModel">

                    </tbody>
                </table>
            </li>
        </ul>

</div>

<!-- Modal for controlInfo -->

        <div class="modal-content">

                <button type="button" class="btn btn-primary col-xs-3" id="btn1">设备信息</button>
                <button type="button" class="btn btn-primary col-xs-3" id="btn2">售后信息</button>
                <button type="button" class="btn btn-primary col-xs-3" id="btn3">链路查询</button>

<!-- Modal for volume -->
<div class="modal fade" id="volumeModel" tabindex="-1" role="dialog" aria-labelledby="volumeModelLabel"
     aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="volumeModelLabel">容量设置</h5>
                <button type="button" class="close _close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="needs-validation">
                    <div class="form-group row">
                        <label class="col-4 col-form-label" for="system_code">选择系统:</label>
                        <div class="col-8">
                            <select class="form-control col-12" id="system_code">
                                <option value="-1">--请选择--</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-4 col-form-label">空闲值区间:</label>
                        <div class="col-8">
                            <div class="row center">
                                <div class="col-5"><input type="number" class="form-control" id="space_min" min="0" value="0" disabled="disabled">
                                </div>
                                ＜N≤
                                <div class="col-5"><input type="number" class="form-control" id="space_max" min="0">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-4 col-form-label">饱和值区间:</label>
                        <div class="col-8">
                            <div class="row center">
                                <div class="col-5"><input type="number" class="form-control" id="saturated_min" min="0">
                                </div>
                                ＜N≤
                                <div class="col-5"><input type="number" class="form-control" id="saturated_max" min="0">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-4 col-form-label">超标值区间:</label>
                        <div class="col-8">
                            <div class="row center">
                                <div class="col-5"><input type="number" class="form-control" id="Exceed_min" min="0">
                                </div>
                                ＜N≤
                                <div class="col-5"><input type="number" class="form-control" id="Exceed_max" min="0">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary _close" data-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary form-submit-2">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for editcontrol -->

</body>
<script type="text/javascript" src="js/number-precision/build/index.iife.js?time=1596531514"></script>
<script type="text/javascript" src="js/a6.js"></script>
<script type="text/javascript">
    //todo 设置容量 step
    let volume_info = {
        template_id: '',
        space_min: '',
        space_max: '',
        saturated_min: '',
        saturated_max: '',
        Exceed_min: '',
        Exceed_max: '',
        system_code: ''
    };
    let template_type;
    let ids = [];
    let qrcodes = [];
    let one_control_id;
    let upCode;
    let Template_Info;
    let dataArr = [];
    let oldArr = [];
    let no_bind_ids = [];
    let all_controls = [];

    //todo 获取传参
    function getQuery(name) {
        let query = window.location.search.substring(1);
        let vars = query.split("&");
        for (let i = 0; i < vars.length; i++) {
            let pair = vars[i].split("=");
            if (pair[0] == name) {
                return pair[1];
            }
        }
        return (false);
    }

    //todo 数组正确排序
    function compare(a,b) {
        if(a.index > b.index){
            return 1;
        }else if(a.index < b.index){
            return -1;
        }else{
            return 0;
        }
    }

    window.onload = function () {
        let qrcode = getQuery('qrcode');
        //console.log(qrcode);
        if (qrcode) {
            $.ajax({
                url: 'http://47.96.99.70:8080/standard-test/getTemplateDetailByMouldCode.html',
                dataType: 'json',
                data: {'qrcode': qrcode},
                type: 'GET',
                success: function (res) {
                    if (res[0].Code == 200) {
                        Template_Info = res[0].data;
                        template_type = res[0].data.template_type;
                        //template_type = 'JG';
                        volume_info.template_id = res[0].data.template_id;
                        if (template_type == 'FJ') {
                            $("#setting_volume").addClass('hide');
                        }
                        load_template();
                        if (Template_Info.detailList[0].control_name == "") {
                            toastr.error("该模板没有添加任何控件，无法显示");
                        } else {
                            for (let k = 0; k < res[0].data.detailList.length; k++) {
                                all_controls.push({
                                    'control_name': res[0].data.detailList[k].control_name,
                                    'qrcode': res[0].data.detailList[k].qrCode
                                });
                                //todo 只放入未绑定的控件
                                if (res[0].data.detailList[k].qrCode == "") {
                                    no_bind_ids.push(res[0].data.detailList[k].control_name);
                                } else {
                                    oldArr.push({
                                        'control_name': res[0].data.detailList[k].control_name,
                                        'qrcode': res[0].data.detailList[k].qrCode
                                    });
                                }
                                ids.push({'control_name':res[0].data.detailList[k].control_name,'index':parseInt(res[0].data.detailList[k].control_name.split('node')[1])});
                            }
                            //console.log(no_bind_ids);
                            Add_Controls(Template_Info.detailList);
                        }
                        upCode = res[0].data.upCode;
                    }
                },
                error: function (error) {
                    toastr.error(error[0].data);
                }
            });
            //todo 获取所属系统
            $.ajax({
                url: 'http://47.96.99.70:8080/standard-test/getAllSystemList.html',
                dataType: 'json',
                type: 'GET',
                success: function (res) {
                    if (res[0].Code == 200) {
                        let _html = '<option value="-1">--请选择--</option>';
                        for (let k = 0; k < res[0].data.length; k++) {
                            _html += '<option value="' + res[0].data[k].sysspell + '">' + res[0].data[k].systemname + '</option>';
                        }
                        $("#system_code").html(_html);
                    }
                },
                error: function (error) {
                    toastr.error(error[0].data);
                }
            });
            //todo 查询设备类型
            $.ajax({
                url: 'http://47.96.99.70:8080/standard-test/getAllAssetTypeInfoList.html',
                dataType: 'json',
                type: 'GET',
                success: function (res) {
                    if (res[0].Code == 200) {
                        //console.log(res[0].data);
                        let _html = '<option value="-1">--请选择--</option>';
                        for (let k = 0; k < res[0].data.length; k++) {
                            _html += "<option value='" + res[0].data[k].id + "'>" + res[0].data[k].typename + "</option>";
                        }
                        $("#equip_type").html(_html);
                    }
                },
                error: function (error) {
                    toastr.error(error[0].data);
                }
            });
            //todo 查询设备名称
            $("#equip_type").on('change', function () {
                let equip_type = $("#equip_type option:selected").val();
                if (equip_type == '-1') {
                    toastr.error("请选择设备类型");
                    $("#equip_name").html('<option value="-1">--请选择--</option>');
                } else {
                    $.ajax({
                        url: 'http://47.96.99.70:8080/standard-test/getAllAssetNameInfoList.html',
                        dataType: 'json',
                        data: {'id': equip_type},
                        type: 'GET',
                        success: function (res) {
                            if (res[0].Code == 200) {
                                //console.log(res[0].data);
                                let _html = '<option value="-1">--请选择--</option>';
                                for (let k = 0; k < res[0].data.length; k++) {
                                    _html += "<option value='" + res[0].data[k].id + "'>" + res[0].data[k].assetname + "</option>";
                                }
                                $("#equip_name").html(_html);
                            }
                        },
                        error: function (error) {
                            toastr.error(error[0].data);
                        }
                    });
                }
            });
        }
    };


    //todo 编辑控件
    function edit_control(id) {
        //toastr.info("暂未开放");
        console.log(id);
        one_control_id = id;
        //todo 查询设备类型
        $.ajax({
            url: 'http://47.96.99.70:8080/standard-test/getAllAssetTypeInfoList.html',
            dataType: 'json',
            type: 'GET',
            success: function (res) {
                if (res[0].Code == 200) {
                    //console.log(res[0].data);
                    let _html = '<option value="-1">--请选择--</option>';
                    for (let k = 0; k < res[0].data.length; k++) {
                        _html += "<option value='" + res[0].data[k].id + "'>" + res[0].data[k].typename + "</option>";
                    }
                    $("#edit_equip_type").html(_html);
                }
            },
            error: function (error) {
                toastr.error(error[0].data);
            }
        });
        //todo 查询设备名称
        $("#edit_equip_type").on('change', function () {
            let equip_type = $("#edit_equip_type option:selected").val();
            if (equip_type == '-1') {
                toastr.error("请选择设备类型");
                $("#edit_equip_name").html('<option value="-1">--请选择--</option>');
            } else {
                $.ajax({
                    url: 'http://47.96.99.70:8080/standard-test/getAllAssetNameInfoList.html',
                    dataType: 'json',
                    data: {'id': equip_type},
                    type: 'GET',
                    success: function (res) {
                        if (res[0].Code == 200) {
                            //console.log(res[0].data);
                            let _html = '<option value="-1">--请选择--</option>';
                            for (let k = 0; k < res[0].data.length; k++) {
                                _html += "<option value='" + res[0].data[k].id + "'>" + res[0].data[k].assetname + "</option>";
                            }
                            $("#edit_equip_name").html(_html);
                        }
                    },
                    error: function (error) {
                        toastr.error(error[0].data);
                    }
                });
            }
        });
        //todo 获取模板列表
        $.ajax({
            url: 'http://47.96.99.70:8080/standard-test/getAllTemplateList.html',
            dataType: 'json',
            type: 'GET',
            success: function (res) {
                if (res[0].Code == 200) {
                    let _html = '<option value="-1">--请选择--</option>';
                    for (let k = 0; k < res[0].tempList.length; k++) {
                        _html += '<option value="' + res[0].tempList[k].template_id + '">' + res[0].tempList[k].template_name + '</option>';
                    }
                    $("#edit_template_id").html(_html);
                }
            },
            error: function (error) {
                toastr.error(error[0].data);
            }
        });
    }

    //todo 打开控件列表
    $("#change-btn").on('click', function () {
        let menu = $("#mobile-menu");
        if (menu.hasClass("show-nav")) {
            setTimeout(function () {
                menu.addClass("hide-nav").removeClass("show-nav");
            }, 100);
            document.getElementById('change-btn').innerHTML = "关闭";
        } else {
            document.getElementById('change-btn').innerHTML = "控件列表";
            setTimeout(function () {
                menu.addClass("show-nav").removeClass("hide-nav");
            }, 100)
        }
    });


    //todo FJ 模板保存
    $(".form-submit-1").on('click', function () {
        qrcodes = [];
        $(".code_list input:checkbox:checked").each(function (index, item) {
            qrcodes.push($(this).attr('data-code'));
        });

        //console.log(qrcodes, ids);
        if (qrcodes.length > ids.length) {
            toastr.error("请选择小于控件数量的编码");
            return;
        } else {
            ids.sort(compare);
            qrcodes.sort();

            if (oldArr.length > 0) {
                if (oldArr.length == Template_Info.detailList.length) {
                    toastr.error("已无剩余控件需要绑定");
                    return;
                }
                let new_data = [];
                let hasrepeat = false;

                for (let k = 0; k < oldArr.length; k++) {
                    for (let i = 0; i < qrcodes.length; i++) {
                        if(qrcodes[i] == oldArr[k].qrcode){
                            hasrepeat = true;
                        }
                    }
                }
                if(hasrepeat == true){
                    toastr.error("选择编码重复，请重新选择");
                    return;
                }
                if(no_bind_ids.length < qrcodes.length){
                    toastr.error("已超出剩余可绑定控件数量");
                    return;
                }
                for (let k = 0; k < no_bind_ids.length; k++) {
                    new_data.push({'control_name': no_bind_ids[k]});
                }
                for (let i = 0; i < qrcodes.length; i++) {
                    new_data[i].qrcode = qrcodes[i];
                }
                console.log(new_data);
                dataArr = oldArr.concat(new_data);
            } else {
                for (let k = 0; k < ids.length; k++) {
                    dataArr.push({'control_name': ids[k].control_name});
                }
                for (let i = 0; i < qrcodes.length; i++) {
                    dataArr[i].qrcode = qrcodes[i];
                }
            }
        }

        $.ajax({
            type: "POST",
            url: "http://47.96.99.70:8080/standard-test/AddCapacityContentDetailUpgradedVersion.html",
            data: {
                "template_id": Template_Info.template_id,
                "qrcode": getQuery('qrcode'), //todo 从路径获取
                "system_code": volume_info.system_code,
                "Mould_Size": qrcodes.length, //todo 该模板内控件总数
                "space_min": 0,
                "space_max": 0,
                "saturated_min": 0,
                "saturated_max": 0,
                "Exceed_min": 0,
                "Exceed_max": 0,
                "jsonString": JSON.stringify(dataArr)
            },
            async: false,
            cache: true,
            dataType: "json",
            success: function (res) {
                if (res[0].Code == 200) {
                    toastr.success(res[0].data);
                    $("._close").click();
                    $.ajax({
                        url: 'http://47.96.99.70:8080/standard-test/getTemplateDetailByMouldCode.html',
                        dataType: 'json',
                        data: {'qrcode': getQuery('qrcode')},
                        type: 'GET',
                        success: function (res) {
                            if (res[0].Code == 200) {
                                Template_Info = res[0].data;
                                load_template();
                                Refresh_List(Template_Info.detailList);
                                upCode = res[0].data.upCode;
                                no_bind_ids = [];
                                oldArr = [];
                                all_controls = [];
                                for (let k = 0; k < res[0].data.detailList.length; k++) {
                                    all_controls.push({
                                        'control_name': res[0].data.detailList[k].control_name,
                                        'qrcode': res[0].data.detailList[k].qrCode
                                    });
                                    if (res[0].data.detailList[k].qrCode == "") {
                                        no_bind_ids.push(res[0].data.detailList[k].control_name);
                                    }else{
                                        oldArr.push({
                                            'control_name': res[0].data.detailList[k].control_name,
                                            'qrcode': res[0].data.detailList[k].qrCode
                                        });
                                    }
                                }
                            }
                        },
                        error: function (error) {
                            toastr.error(error[0].data);
                        }
                    });
                } else {
                    toastr.error(res[0].data);
                    $("._close").click();
                }
            },
            error: function (error) {
                toastr.error(error[0].data);
            },
            complete: function () {
                console.log("done")
            }
        });
    });

    //todo 单个控件的关联操作 内部的qrcode为内部变量
    $(".form-submit-3").on('click', function () {
        if (!upCode) {
            toastr.error("请先批量关联");

        }

        });

            return;
        }

            toastr.error("请选择一个编码");
            return;
        }

            type: "POST",
            url: "http://47.96.99.70:8080//standard-test/AssociateControl.html",

                "upCode": upCode,

            dataType: "json",

                            oldArr = [];
                            all_controls = [];

                                    'qrcode': res[0].data.detailList[k].qrCode
                                });
                                if (res[0].data.detailList[k].qrCode == "") {
                                    no_bind_ids.push(res[0].data.detailList[k].control_name);
                                }else{
                                    oldArr.push({
                                        'control_name': res[0].data.detailList[k].control_name,
                                        'qrcode': res[0].data.detailList[k].qrCode
                                    });
                                }
                            }
                        }
                    },
                    error: function (error) {
                        toastr.error(error[0].data);
                    }
                });
            },
            error: function () {
                console.log("发生错误");
            },
            complete: function () {
                console.log("done")
            }
        });
    });
