spec_version: 1
id: frame-logo-outro
name: Logo Outro Frame
description: >
  Segmented logo assembly + glow bloom + tagline reveal — perfect for video outros and brand closing frames.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: intro-outro
subcategory: outro
tags: [logo, outro, branding, end-card, frame, glow]

best_for:
  - "Video closing card"
  - "Brand outro"
  - "Channel sign-off"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 10
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [brand_name]
    properties:
      brand_name:
        type: "string"
        maxLength: 60
        description: "Brand or product name displayed below the logo"
      tagline:
        type: "string"
        maxLength: 120
        description: "Tagline shown beneath the brand name"
      primary_url:
        type: "string"
        description: "Footer URL or CTA link"
      duration_sec:
        type: "number"
        minimum: 3
        maximum: 10
        default: 5
  examples:
    - {"brand_name": "Open Design", "tagline": "Design that evolves itself", "primary_url": "open-design.ai", "duration_sec": 5}

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: 
  contact: 

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-27
    notes: Cherry-picked from open-design/repo/skills/frame-logo-outro/example.html

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 5
    render_wall_clock_sec: 9
    machine: "M2 MacBook Air"
