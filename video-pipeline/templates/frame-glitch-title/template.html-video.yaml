spec_version: 1
id: frame-glitch-title
name: Glitch Title
description: >
  Cyberpunk-style glitch title with RGB shift, scanline, and chromatic aberration effects.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: presentation
subcategory: text-card
tags: [title, glitch, cyberpunk, rgb-shift, tech, scanline]

best_for:
  - "Tech product reveal"
  - "Cyberpunk aesthetic"
  - "Hacker vibe"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 8
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [title]
    properties:
      title:
        type: "string"
        maxLength: 80
        description: "Main glitch title"
      subtitle:
        type: "string"
        maxLength: 120
        description: "Optional supporting line"
      duration_sec:
        type: "number"
        minimum: 3
        maximum: 8
        default: 4
  examples:
    - {"title": "SYSTEM ONLINE", "subtitle": "v2.6.0 — initialized", "duration_sec": 4}

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: ""
  contact: ""
version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-27
    notes: Cherry-picked from open-design/repo/skills/frame-glitch-title/example.html

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 4
    render_wall_clock_sec: 8
    machine: "M2 MacBook Air"
