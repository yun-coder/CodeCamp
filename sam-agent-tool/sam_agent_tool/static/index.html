<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM Agent Tool — Image Segmentation</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4eb;
    --muted: #8b8fa3;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --success: #00cec9;
    --danger: #ff7675;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--muted); margin-top: 8px; font-size: 14px; }

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 20px;
    background: var(--card);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #1e1f30;
  }
  .upload-zone .icon { font-size: 48px; margin-bottom: 16px; }
  .upload-zone .title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone .hint { font-size: 13px; color: var(--muted); }
  .upload-zone input[type=file] { display: none; }

  .status {
    display: none;
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-weight: 500;
    text-align: center;
  }
  .status.loading {
    display: block;
    background: #1a1d27;
    border: 1px solid var(--accent);
    color: var(--accent-glow);
  }
  .status.success {
    display: block;
    background: #0d2b1f;
    border: 1px solid var(--success);
    color: var(--success);
  }
  .status.error {
    display: block;
    background: #2b0d0d;
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid transparent;
    border-top-color: var(--accent-glow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }
  .results.active { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .result-header h2 { font-size: 20px; }
  .result-stats { display: flex; gap: 16px; color: var(--muted); font-size: 13px; }
  .result-stats b { color: var(--accent-glow); }

  .overlay-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .overlay-card img { width: 100%; display: block; }

  .object-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .object-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .object-card:hover { border-color: var(--accent); }
  .object-card .oid { font-weight: 700; color: var(--accent-glow); }
  .object-card .meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .object-card .meta span { display: inline-block; margin-right: 12px; }
  .object-card .mask-img {
    width: 100%;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal.active { display: flex; }
  .modal-content {
    max-width: 90vw;
    max-height: 90vh;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
  }
  .modal-content img { max-width: 100%; max-height: 80vh; border-radius: 8px; }
  .modal-close {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 24px;
    color: var(--text);
    cursor: pointer;
    background: none;
    border: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>SAM Agent Tool</h1>
  <p>Upload an image — the AI agent will automatically segment all objects</p>
</div>

<div class="container">
  <div class="upload-zone" id="uploadZone">
    <div class="icon">&#x1F4E4;</div>
    <div class="title">Click or drag image here</div>
    <div class="hint">Supports JPG, PNG, BMP, WebP — up to 20MB</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="status" id="status"></div>

  <div class="results" id="results">
    <div class="result-header">
      <h2>Segmentation Results</h2>
      <div class="result-stats">
        <span>Objects: <b id="objCount">0</b></span>
        <span>Time: <b id="elapsed">0s</b></span>
      </div>
    </div>

    <div class="overlay-card">
      <img id="overlayImg" src="" alt="Segmentation overlay">
    </div>

    <h3 style="margin:20px 0 12px;color:var(--muted)">Detected Objects</h3>
    <div class="object-list" id="objectList"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&times;</button>
    <img id="modalImg" src="">
  </div>
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
const statusEl   = document.getElementById('status');
const resultsEl  = document.getElementById('results');
const overlayImg = document.getElementById('overlayImg');
const objCountEl = document.getElementById('objCount');
const elapsedEl  = document.getElementById('elapsed');
const objectList = document.getElementById('objectList');
const modal      = document.getElementById('modal');
const modalImg   = document.getElementById('modalImg');
const modalClose = document.getElementById('modalClose');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) upload(e.target.files[0]);
});

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) upload(file);
});

async function upload(file) {
  if (!file.type.startsWith('image/')) {
    showStatus('Please upload an image file.', 'error');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    showStatus('File too large. Max 20MB.', 'error');
    return;
  }

  resultsEl.classList.remove('active');
  showStatus('<span class="spinner"></span>Agent analyzing image...', 'loading');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/api/segment', { method: 'POST', body: formData });
    const data = await resp.json();

    if (!resp.ok || data.task.status === 'error') {
      showStatus('Error: ' + (data.task && data.task.error || resp.statusText), 'error');
      return;
    }

    showStatus(null);
    renderResults(data);
  } catch (err) {
    showStatus('Network error: ' + err.message, 'error');
  }
}

function showStatus(msg, type) {
  if (!msg) { statusEl.style.display = 'none'; return; }
  statusEl.className = 'status ' + type;
  statusEl.innerHTML = msg;
}

function renderResults(data) {
  resultsEl.classList.add('active');
  objCountEl.textContent = data.total_objects;
  elapsedEl.textContent = (data.task && data.task.elapsed_seconds || 0) + 's';

  if (data.overlay_url) {
    overlayImg.src = data.overlay_url;
  }

  objectList.innerHTML = '';
  data.objects.forEach(obj => {
    const card = document.createElement('div');
    card.className = 'object-card';
    card.innerHTML =
      '<div class="oid">Object #' + obj.id + '</div>' +
      '<div class="meta">' +
        '<span>Score: ' + obj.score.toFixed(3) + '</span>' +
        '<span>Area: ' + obj.area + 'px</span>' +
      '</div>' +
      '<div class="meta">' +
        '<span>' + obj.bbox.w + '×' + obj.bbox.h + '</span>' +
        '<span>@(' + obj.bbox.x + ',' + obj.bbox.y + ')</span>' +
      '</div>' +
      '<img class="mask-img" src="' + obj.crop_url + '" alt="Crop ' + obj.id + '" loading="lazy"' +
           ' onclick="event.stopPropagation();openModal(\'' + obj.crop_url + '\')">';
    card.addEventListener('click', function() { openModal(obj.mask_url); });
    objectList.appendChild(card);
  });
}

function openModal(url) {
  modalImg.src = url;
  modal.classList.add('active');
}
modalClose.addEventListener('click', function() { modal.classList.remove('active'); });
modal.addEventListener('click', function(e) {
  if (e.target === modal) modal.classList.remove('active');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') modal.classList.remove('active');
});
</script>
</body>
</html>
